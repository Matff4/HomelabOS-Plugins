name: Validate

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release tarballs
        run: python scripts/build-release.py

      - name: Validate catalog JSON
        run: python -c "import json; c=json.load(open('index.json')); assert c['version']==1; assert c['plugins']"

      - name: Check catalog tarballs exist
        run: |
          python <<'PY'
          import json
          from pathlib import Path
          catalog = json.loads(Path("index.json").read_text())
          for entry in catalog["plugins"]:
              expected = f"{entry['id']}-{entry['version']}.tar.gz"
              if not Path(f"releases/{expected}").is_file():
                  raise SystemExit(f"Missing release file: releases/{expected}")
              url = entry.get("tarball_url", "")
              if not url.endswith(expected):
                  raise SystemExit(
                      f"tarball_url for {entry['id']!r} must end with {expected!r}, got {url!r}"
                  )
          print("All catalog tarballs present and URLs match")
          PY
